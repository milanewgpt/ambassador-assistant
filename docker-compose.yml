services:
  api:
    build: .
    container_name: amb-api
    restart: unless-stopped
    init: true
    ports:
      - "8002:8000"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./logs:/opt/ambassador/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3

  worker:
    build: .
    container_name: amb-worker
    restart: unless-stopped
    init: true
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./logs:/opt/ambassador/logs
    command: python -m worker.scheduler
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: amb-nginx
    restart: unless-stopped
    init: true
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
